name: deploy-frontend-stg

on:
  push:
    branches: ['main']
    paths:
      - '**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: stg-familyapp-hwhub-frontend
  CLOUDFRONT_DIST_ID: E1YNBFWI5JVJHW

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # git describe がタグ履歴を参照するため fetch-depth: 0 が必須
          fetch-depth: 0

      - name: Resolve STG version (git describe)
        id: version
        run: |
          # タグが1件もない場合のフォールバック
          RAW=$(git describe --tags --long 2>/dev/null || echo "v0.0.0-0-g${GITHUB_SHA:0:7}")
          # v1.0.0-3-gabcdef1  →  v1.0.0-stg.3 に変換
          TAG=$(echo "$RAW" | sed 's/-[0-9]*-g[0-9a-f]*$//')
          DISTANCE=$(echo "$RAW" | grep -oP '(?<=-)\d+(?=-g)')
          APP_VERSION="${TAG}-stg.${DISTANCE}"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved STG version: ${APP_VERSION}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::564323392873:role/gh-actions-hwhub-frontend-stg
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build (stg)
        # VITE_APP_VERSION をビルド時環境変数として渡す
        # vite.config.ts の define で import.meta.env.VITE_APP_VERSION に展開される
        run: VITE_APP_VERSION=${{ steps.version.outputs.app_version }} npm run build:stg

      # dist/ を S3 に同期（不要ファイルは削除）
      - name: Upload to S3
        run: |
          aws s3 sync dist "s3://${S3_BUCKET}/" --delete

      # SPAのため、必ず invalidation（最低でも index.html は必須）
      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DIST_ID}" \
            --paths "/*"
