name: deploy-frontend-stg

on:
  push:
    branches: ['main']
    paths:
      - '**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: stg-familyapp-hwhub-frontend
  CLOUDFRONT_DIST_ID: E1YNBFWI5JVJHW

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::564323392873:role/gh-actions-hwhub-frontend-stg
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build (stg)
        run: npm run build:stg

      # dist/ を S3 に同期（不要ファイルは削除）
      - name: Upload to S3
        run: |
          aws s3 sync dist "s3://${S3_BUCKET}/" --delete

      # SPAのため、必ず invalidation（最低でも index.html は必須）
      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DIST_ID}" \
            --paths "/*"
