name: deploy-frontend-prd

on:
  push:
    # v で始まるタグ（例: v1.0.0, v1.2.3）のみトリガー
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Deploy tag (e.g. v1.0.0)'
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  # TODO: PRD環境構築後に設定
  # S3_BUCKET: prd-familyapp-hwhub-frontend
  # CLOUDFRONT_DIST_ID: XXXXXXXXXXXXX

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PRD version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APP_VERSION="${{ github.event.inputs.tag }}"
          else
            APP_VERSION="${{ github.ref_name }}"
          fi
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved PRD version: ${APP_VERSION}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # TODO: PRD環境構築後に PRD用IAMロールに変更
          role-to-assume: arn:aws:iam::564323392873:role/gh-actions-hwhub-frontend-stg
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build (prd)
        run: VITE_APP_VERSION=${{ steps.version.outputs.app_version }} npm run build:prd

